<!doctype html>
<html lang="%paraglide.lang%">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // iOS Safari sometimes fails to recompute the CSS layout after an
      // orientation change, leaving the page laid out at the previous (portrait)
      // width. Force a synchronous reflow once the new dimensions have settled.
      (function () {
        function reflow() {
          var b = document.body;
          if (!b) return;
          var prev = b.style.display;
          b.style.display = 'none';
          void b.offsetHeight; // flush layout while detached
          b.style.display = prev;
        }
        function onChange() {
          // matchMedia 'change' fires after the new size is applied; one rAF is a
          // safety margin for the legacy orientationchange path on older iPadOS.
          requestAnimationFrame(reflow);
        }
        window.addEventListener('orientationchange', onChange);
        if (window.matchMedia) {
          window.matchMedia('(orientation: portrait)').addEventListener('change', onChange);
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/icon.svg" />
    <link rel="mcp" href="/mcp/sse" title="Gyeon Storefront MCP" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div>%sveltekit.body%</div>
  </body>
</html>
