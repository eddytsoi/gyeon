services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/eddytsoi/gyeon-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # 35s > the 30s srv.Shutdown(ctx) timeout in cmd/api/main.go so docker
    # never SIGKILLs a backend that's still draining in-flight HTTP.
    stop_grace_period: 35s
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:          postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      ADMIN_JWT_SECRET:      ${ADMIN_JWT_SECRET}
      CUSTOMER_JWT_SECRET:   ${CUSTOMER_JWT_SECRET}
      ADMIN_EMAIL:           ${ADMIN_EMAIL}
      ADMIN_PASSWORD:        ${ADMIN_PASSWORD}
      BASE_URL:              ${BASE_URL}
      # TEMP diagnostic switch: when set truthy in .env, send_email_batch is
      # logged but NOT delivered (lets imports be tested without sending mail).
      # Empty/unset = normal delivery. Remove with the dry-run code block.
      EMAIL_DRY_RUN:         ${EMAIL_DRY_RUN:-}
    volumes:
      - uploads:/app/uploads
    # `wget --spider` from busybox (built into the alpine base) is enough
    # to probe /health (defined in cmd/api/main.go); avoids adding curl to
    # the image. start_period covers boot: env load + DB connect + routing.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/eddytsoi/gyeon-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      ORIGIN:   ${BASE_URL}
      API_BASE: http://backend:8080/api/v1

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/nginx/certs:/etc/nginx/certs:ro
    # Wait for backend to actually answer /health before bringing nginx up.
    # Eliminates the cold-start 502 window on fresh VM boots where nginx
    # was up before the backend had finished initialising.
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  postgres_data:
  uploads:
