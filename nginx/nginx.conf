# SvelteKit frontend upstream. Both lines resolve to the same docker
# service — the duplicate `backup` entry exists so `proxy_next_upstream`
# has a "next server" to fall over to during deploy windows. Without it,
# single-server upstreams reject retry attempts entirely (nginx OSS
# behaviour). max_fails=0 keeps the server permanently eligible so the
# brief connection-refused during `docker compose up -d` doesn't
# blacklist it for subsequent users.
upstream sveltekit_app {
    server frontend:3000 max_fails=0;
    server frontend:3000 max_fails=0 backup;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    # Backend API
    location /api/v1/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        # Allow SSE (Server-Sent Events) to stream without buffering
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # Uploaded media files
    location /uploads/ {
        proxy_pass       http://backend:8080;
        proxy_set_header Host $host;
    }

    # MCP server
    location /mcp/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    location /.well-known/mcp.json {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # SvelteKit frontend (everything else)
    location / {
        proxy_pass         http://sveltekit_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        # SvelteKit emits a long Link: rel=preload header listing every JS
        # chunk; combined with the CSP/HSTS/X-Frame headers from hooks.server.ts
        # this overflows nginx's default 4 KB proxy_buffer_size and surfaces as
        # a Cloudflare 502. 16 KB gives headroom for deep route trees.
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 16k;
        # Deploy-window retry: `docker compose up -d` recreates the frontend
        # container and there's a ~5-10 s gap when the old instance has
        # stopped listening and the new one isn't ready yet — Cloudflare
        # surfaces this as a 502. Fail fast on connect (1 s) and retry within
        # a 15 s budget. nginx only retries idempotent methods by default, so
        # GET pages (home / category / product) recover transparently while
        # POSTs (checkout, cart writes) still fail loudly with no double-submit.
        proxy_connect_timeout         1s;
        proxy_next_upstream           error timeout http_502 http_503;
        proxy_next_upstream_tries     0;
        proxy_next_upstream_timeout   15s;
    }
}
