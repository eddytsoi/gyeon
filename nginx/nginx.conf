# SvelteKit frontend upstream. All five entries resolve to the same
# docker service — duplicates exist purely so `proxy_next_upstream` has
# a chain of "next servers" to fall over to during deploy windows.
# Empirical: with N entries we get ~N/2 retry attempts (nginx OSS walks
# the group once per request and doesn't loop). 5 entries × 2 s connect
# timeout ≈ 8 s retry budget — covers typical `docker compose up -d`
# gaps (3–6 s) and stays well inside Cloudflare's 100 s origin timeout.
# max_fails=0 keeps every entry permanently eligible so the brief
# outage doesn't blacklist the server for subsequent users.
upstream sveltekit_app {
    server frontend:3000 max_fails=0;
    server frontend:3000 max_fails=0;
    server frontend:3000 max_fails=0;
    server frontend:3000 max_fails=0;
    server frontend:3000 max_fails=0;
}

# Backend API upstream. Same duplicate-entry trick as sveltekit_app so
# proxy_next_upstream can walk the group during the backend's
# `docker compose up -d` restart window. `keepalive 32` reuses TCP
# connections to the upstream — saves ~1 ms per request and avoids
# ephemeral-port churn under load. Requires `proxy_set_header Connection ""`
# at the location block. SSE-only locations bypass this upstream and
# proxy directly to `backend:8080` because keepalive + retry don't help
# long-lived streams.
upstream backend_api {
    server backend:8080 max_fails=0;
    server backend:8080 max_fails=0;
    server backend:8080 max_fails=0;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    # Server-Sent Events — admin dashboard live updates. Exact match wins
    # over the prefix /api/v1/ block below, so this short-circuits the
    # retry-and-short-timeout policy that would sever the stream.
    location = /api/v1/admin/events {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # Server-Sent Events — WooCommerce importer streams (products, customers,
    # orders). Regex match takes priority over the /api/v1/ prefix below.
    location ~ ^/api/v1/admin/import/woocommerce/(stream|customers/stream|orders/stream)$ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # Backend API — everything else under /api/v1/
    # Retry policy mirrors the / (sveltekit) block: walk the backend_api
    # upstream group on connection-level failures or upstream 502/503 so
    # the brief 3-6 s `docker compose restart backend` gap surfaces as a
    # successful request instead of a 500 page. We deliberately do NOT
    # add `non_idempotent` — that would replay POST bodies and could
    # double-charge checkouts or duplicate cart writes. nginx's default
    # behaviour only retries http_502/503 for idempotent methods
    # (GET/HEAD); error/timeout are always safe because no body has been
    # sent yet. proxy_set_header Connection "" is required to use the
    # upstream's `keepalive 32` directive.
    location /api/v1/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_connect_timeout 2s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_next_upstream         error timeout http_502 http_503;
        proxy_next_upstream_tries   3;
        proxy_next_upstream_timeout 6s;
    }

    # Uploaded media files — GET-only, retry connection-level failures
    # against the backend_api upstream so the deploy window doesn't
    # surface as a broken <img>. http_502/503 are intentionally NOT
    # retried for /uploads/: an upstream 502 here almost always means a
    # real backend bug serving a specific file, and walking the upstream
    # group would hide it.
    location /uploads/ {
        proxy_pass            http://backend_api;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto https;
        proxy_set_header      Connection        "";
        proxy_connect_timeout 2s;
        proxy_read_timeout    60s;
        proxy_next_upstream         error timeout;
        proxy_next_upstream_tries   3;
        proxy_next_upstream_timeout 6s;
    }

    # MCP server
    location /mcp/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    location /.well-known/mcp.json {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # WooCommerce REST shim — ShipAny pushes shipment status updates to
    # /wp-json/wc/v3/orders/{id} using consumer_key/secret from the
    # original WC OAuth handshake. Handler is at backend (see
    # backend/internal/wcshim); we route only the specific subtree so
    # other /wp-json/* paths still 404 from SvelteKit (a passive signal
    # that this is no longer a WordPress site).
    location /wp-json/wc/v3/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_connect_timeout 2s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # SvelteKit frontend (everything else)
    location / {
        proxy_pass         http://sveltekit_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        # SvelteKit emits a long Link: rel=preload header listing every JS
        # chunk; combined with the CSP/HSTS/X-Frame headers from hooks.server.ts
        # this overflows nginx's default 4 KB proxy_buffer_size and surfaces as
        # a Cloudflare 502. 16 KB gives headroom for deep route trees.
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 16k;
        # Deploy-window retry: `docker compose up -d` recreates the frontend
        # container and there's a ~3-6 s gap when the old instance has
        # stopped listening and the new one isn't ready yet — Cloudflare
        # surfaces this as a 502. Fail-fast connect (2 s) then walk the
        # upstream group above; gives roughly 8 s of retry budget before
        # giving up. nginx retries connection-refused for ALL methods
        # (incl. POST) because no data has been sent yet — safe — but won't
        # retry once the upstream has accepted the connection, so a real
        # 502 from frontend still surfaces.
        proxy_connect_timeout         2s;
        proxy_next_upstream           error timeout http_502 http_503;
        proxy_next_upstream_tries     0;
        proxy_next_upstream_timeout   15s;
    }
}
